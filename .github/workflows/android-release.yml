name: Android Release (signed APK + AAB)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android-app/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/android-release.yml'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Release signing secrets are required. Add the four ANDROID_* secrets in repository settings."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install root dependencies
        run: npm ci

      - name: Install android-app dependencies
        run: npm ci
        working-directory: android-app

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android-app/android/release-keystore.jks

      - name: Build signed release APK
        run: npm run build:release:apk
        working-directory: android-app
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/android/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify Android web assets are relative (white-screen guard)
        run: |
          sed -n '1,30p' android-app/android/app/src/main/assets/public/index.html
          grep -q 'src="./assets/' android-app/android/app/src/main/assets/public/index.html
          grep -q 'href="./assets/' android-app/android/app/src/main/assets/public/index.html

      - name: Build signed release AAB
        run: npm run build:release:aab
        working-directory: android-app
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/android/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wow-web-music-player-release-apk
          path: android-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: wow-web-music-player-release-aab
          path: android-app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: rm -f android-app/android/release-keystore.jks
