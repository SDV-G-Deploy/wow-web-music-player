name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android-app/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/android-debug-apk.yml'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install root dependencies
        run: npm ci

      - name: Install android-app dependencies
        run: npm ci
        working-directory: android-app

      - name: Build web + sync Capacitor Android project
        run: npm run sync
        working-directory: android-app

      - name: Verify Android web assets are relative (white-screen guard)
        run: |
          sed -n '1,30p' android-app/android/app/src/main/assets/public/index.html
          grep -q 'src="./assets/' android-app/android/app/src/main/assets/public/index.html
          grep -q 'href="./assets/' android-app/android/app/src/main/assets/public/index.html

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug
        working-directory: android-app/android

      - name: Verify debug APK output
        run: |
          ls -lah android-app/android/app/build/outputs/apk/debug
          test -f android-app/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wow-web-music-player-debug-apk
          path: android-app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
