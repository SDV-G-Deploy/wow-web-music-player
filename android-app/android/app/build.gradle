apply plugin: 'com.android.application'

import java.util.Properties

// Local (non-committed) signing file: android-app/android/keystore.properties
// Example keys:
// ANDROID_KEYSTORE_PATH=/absolute/path/to/release-keystore.jks
// ANDROID_KEYSTORE_PASSWORD=...
// ANDROID_KEY_ALIAS=...
// ANDROID_KEY_PASSWORD=...
def localKeystoreProps = new Properties()
def localKeystorePropsFile = rootProject.file('keystore.properties')
if (localKeystorePropsFile.exists()) {
    localKeystorePropsFile.withInputStream { stream ->
        localKeystoreProps.load(stream)
    }
}

def resolveSigningValue = { String key ->
    def envValue = System.getenv(key)
    if (envValue != null && !envValue.toString().trim().isEmpty()) {
        return envValue.toString().trim()
    }

    def gradlePropValue = project.findProperty(key)
    if (gradlePropValue != null && !gradlePropValue.toString().trim().isEmpty()) {
        return gradlePropValue.toString().trim()
    }

    def localValue = localKeystoreProps.getProperty(key)
    if (localValue != null && !localValue.toString().trim().isEmpty()) {
        return localValue.toString().trim()
    }

    return null
}

def releaseKeystorePath = resolveSigningValue('ANDROID_KEYSTORE_PATH')
def releaseKeystorePassword = resolveSigningValue('ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = resolveSigningValue('ANDROID_KEY_ALIAS')
def releaseKeyPassword = resolveSigningValue('ANDROID_KEY_PASSWORD')
def hasReleaseSigning = [
    releaseKeystorePath,
    releaseKeystorePassword,
    releaseKeyAlias,
    releaseKeyPassword
].every { it != null && !it.toString().trim().isEmpty() }

android {
    namespace = "com.sdv.wowmusicplayer"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.sdv.wowmusicplayer"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def releaseRequested = graph.allTasks.any { task ->
        task.name == 'assembleRelease' || task.name == 'bundleRelease'
    }

    if (releaseRequested && !hasReleaseSigning) {
        throw new GradleException(
            "Missing Android release signing config. Provide ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD via env vars, Gradle properties, or android-app/android/keystore.properties"
        )
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
