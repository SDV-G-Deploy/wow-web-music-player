<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#120f28" />
    <title>Offline • Wow Web Music Player</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(103, 232, 249, 0.25), transparent 50%),
          linear-gradient(130deg, #0b1020 0%, #1a0f2e 50%, #2a183f 100%);
        color: #eef3ff;
        padding: 1rem;
      }
      .card {
        width: min(520px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(14px);
        padding: 1.2rem 1.3rem;
      }
      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
      }
      p {
        opacity: 0.92;
        line-height: 1.45;
      }
      a {
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You're offline ⚡</h1>
      <p>
        Wow Web Music Player can still open offline when cached. If this is your first load,
        reconnect once to cache assets + demo tracks.
      </p>
      <p>Tip: after reconnecting, install the app for instant launch from home screen.</p>
      <p><a href="./">Try reloading player</a></p>
    </section>
  </body>
</html>
